<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site_title }}{% endblock %}</title>
    <meta name="description" content="{% block description %}Технические статьи с AI-обработкой{% endblock %}">
    <link rel="alternate" type="application/rss+xml" title="RSS" href="/feed/rss.xml">
    <link rel="alternate" type="application/rss+xml" title="Дзен RSS" href="/feed/dzen.xml">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="/" class="logo">{{ site_title }}</a>
            <nav>
                <a href="/">Статьи</a>
                <a href="/feed/rss.xml">RSS</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 {{ site_title }} &middot; AI-powered tech digest</p>
        </div>
    </footer>
</body>
</html>
